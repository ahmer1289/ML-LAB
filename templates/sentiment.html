<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis — ML Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #5d6d7e;
            --border-color: #d5dbe0;
            --sentiment-primary: #fa709a;
            --sentiment-primary: #e74c3c;
            /* Pink/Gold theme from your original gradient */
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding-top: 80px;
        }

        .navbar {
            background: #fff;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand {
            color: var(--text-main) !important;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            border-top: 5px solid var(--sentiment-primary);
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05) !important;
        }

        .service-header {
            padding: 30px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
        }

        .service-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 15px;
            /* Update this line below */
            background: linear-gradient(135deg, #fa709a 0%, #f75a5a 100%);
        }

        /* Recording UI */
        .record-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: var(--sentiment-primary);
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .record-btn.recording {
            animation: pulse 1.5s infinite;
            background: #e91e63;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(250, 112, 154, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(250, 112, 154, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(250, 112, 154, 0);
            }
        }

        .timer {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            margin-left: 15px;
        }

        .btn-gradient {
            background: var(--text-main);
            color: white;
            border: none;
            transition: 0.2s;
        }

        .btn-gradient:hover {
            background: #1a252f;
            color: white;
        }

        .transcript-box {
            background: #f8f9fa;
            border-left: 4px solid var(--border-color);
            padding: 15px;
            font-style: italic;
            border-radius: 4px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-lg">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chevron-left me-2"></i>Back to Hub
            </a>
        </div>
    </nav>

    <div class="container-lg py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="service-card">
                    <div class="service-header text-center">
                        <div class="service-icon mx-auto">
                            <i class="fas fa-smile"></i>
                        </div>
                        <h1 class="h4 mb-2 fw-bold">Sentiment Analysis</h1>
                        <p class="text-secondary mb-0">Detect emotional tone and sentiment from voice recordings.</p>
                    </div>

                    <div class="p-4 p-md-5">
                        <form id="sent-form">
                            <div class="mb-5 text-center" id="recording-section">
                                <label class="form-label d-block fw-bold small text-uppercase text-muted mb-3">Option 1:
                                    Record Voice</label>
                                <div class="d-flex align-items-center justify-content-center">
                                    <button type="button" id="record-btn" class="record-btn">
                                        <i class="fas fa-microphone"></i>
                                    </button>
                                    <span id="timer" class="timer">00:00</span>
                                </div>
                                <small class="text-secondary d-block mt-3" id="record-status">Click to record your
                                    message</small>
                            </div>

                            <div id="playback-preview" class="mb-5 text-center" style="display:none;">
                                <label class="form-label d-block fw-bold small text-uppercase text-muted mb-3">Preview
                                    Recording</label>
                                <div class="p-4 bg-light rounded border mb-3">
                                    <audio id="preview-audio" controls class="w-100 mb-3"></audio>
                                    <div class="d-flex gap-2 justify-content-center">
                                        <button type="button" id="submit-recorded-btn" class="btn btn-gradient px-4">
                                            <i class="fas fa-check me-2"></i>Analyze Now
                                        </button>
                                        <button type="button" id="reset-record-btn"
                                            class="btn btn-outline-secondary px-4">
                                            <i class="fas fa-undo me-2"></i>Retry
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="position-relative mb-5 text-center">
                                <hr style="opacity:0.1">
                                <span
                                    class="position-absolute top-50 start-50 translate-middle px-3 text-muted small fw-bold"
                                    style="background: #fff;">OR</span>
                            </div>

                            <div class="mb-4">
                                <label for="audio-input" class="form-label fw-bold small text-uppercase text-muted">
                                    <i class="fas fa-file-audio me-2"></i>Option 2: Upload File
                                </label>
                                <div class="input-group">
                                    <input type="file" class="form-control" id="audio-input" name="audio"
                                        accept="audio/*">
                                    <button class="btn btn-gradient px-4" type="submit" id="analyze-btn">
                                        <i class="fas fa-play me-2"></i>Analyze
                                    </button>
                                </div>
                            </div>
                        </form>

                        <div id="sent-loading" class="text-center py-4" style="display:none;">
                            <div class="spinner-border text-primary" role="status"
                                style="width: 2.5rem; height: 2.5rem; color: #fa709a !important;"></div>
                            <p class="mt-3 text-secondary small">Transcribing and analyzing sentiment...</p>
                        </div>

                        <div id="sent-result" class="mt-4" style="display:none;">
                            <div class="alert alert-info border-0 shadow-sm bg-white">
                                <h6 class="fw-bold mb-3 text-dark"><i class="fas fa-poll me-2 text-primary"></i>Analysis
                                    Breakdown</h6>
                                <div id="sent-result-content"></div>
                            </div>
                        </div>

                        <div id="sent-error" class="mt-4" style="display:none;">
                            <div class="alert alert-danger border-0 small">
                                <i class="fas fa-exclamation-triangle me-2"></i><span id="sent-error-msg"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Advanced Machine Learning Assistant. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/recorder.js"></script>
    <script>
        let timerInterval;
        let seconds = 0;

        function startTimer() {
            seconds = 0;
            document.getElementById('timer').textContent = "00:00";
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); document.getElementById('timer').textContent = "00:00"; }

        async function processAudio(blobOrFile) {
            const fd = new FormData();
            if (blobOrFile instanceof Blob && !blobOrFile.name) {
                const ext = blobOrFile.type.includes('wav') ? 'wav' : 'webm';
                fd.append('audio', blobOrFile, `recording.${ext}`);
            } else {
                fd.append('audio', blobOrFile);
            }

            document.getElementById('sent-loading').style.display = 'block';
            document.getElementById('sent-result').style.display = 'none';
            document.getElementById('sent-error').style.display = 'none';
            document.getElementById('sent-form').style.opacity = '0.5';

            try {
                const res = await fetch('/api/sentiment_voice', { method: 'POST', body: fd });
                const json = await res.json();

                document.getElementById('sent-loading').style.display = 'none';
                document.getElementById('sent-form').style.opacity = '1';

                if (json.error) {
                    document.getElementById('sent-error-msg').textContent = json.error;
                    document.getElementById('sent-error').style.display = 'block';
                } else {
                    let badgeClass = 'bg-secondary';
                    if (json.sentiment.label === 'POSITIVE') badgeClass = 'bg-success';
                    else if (json.sentiment.label === 'NEGATIVE') badgeClass = 'bg-danger';
                    else badgeClass = 'bg-warning text-dark';

                    const html = `
                        <div class="mb-4">
                            <label class="small text-uppercase fw-bold text-muted mb-1">Transcript</label>
                            <div class="transcript-box">"${json.text}"</div>
                        </div>
                        <div class="row align-items-center g-3">
                            <div class="col-6 border-end">
                                <label class="small text-uppercase fw-bold text-muted d-block">Sentiment</label>
                                <span class="badge ${badgeClass} fs-6 px-3 py-2 mt-1">${json.sentiment.label}</span>
                            </div>
                            <div class="col-6">
                                <label class="small text-uppercase fw-bold text-muted d-block">Confidence</label>
                                <span class="fs-4 fw-bold text-dark">${(json.sentiment.score * 100).toFixed(1)}%</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('sent-result-content').innerHTML = html;
                    document.getElementById('sent-result').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('sent-error-msg').textContent = e.message;
                document.getElementById('sent-error').style.display = 'block';
                document.getElementById('sent-loading').style.display = 'none';
                document.getElementById('sent-form').style.opacity = '1';
            }
        }

        const recordBtn = document.getElementById('record-btn');
        const recordStatus = document.getElementById('record-status');
        const playbackPreview = document.getElementById('playback-preview');
        const recordingSection = document.getElementById('recording-section');
        const previewAudio = document.getElementById('preview-audio');
        const submitRecordedBtn = document.getElementById('submit-recorded-btn');
        const resetRecordBtn = document.getElementById('reset-record-btn');

        let lastRecordedBlob = null;

        recordBtn.addEventListener('click', async () => {
            if (!AudioRecorder.getState()) {
                try {
                    await AudioRecorder.start();
                    recordBtn.classList.add('recording');
                    recordBtn.innerHTML = '<i class="fas fa-stop"></i>';
                    recordStatus.textContent = "Recording... Click to stop";
                    startTimer();
                    document.getElementById('sent-result').style.display = 'none';
                    document.getElementById('sent-error').style.display = 'none';
                } catch (err) { alert("Microphone error."); }
            } else {
                lastRecordedBlob = await AudioRecorder.stop();
                recordBtn.classList.remove('recording');
                recordBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                recordStatus.textContent = "Click mic to record";
                stopTimer();
                if (lastRecordedBlob) {
                    previewAudio.src = URL.createObjectURL(lastRecordedBlob);
                    recordingSection.style.display = 'none';
                    playbackPreview.style.display = 'block';
                }
            }
        });

        submitRecordedBtn.addEventListener('click', () => { if (lastRecordedBlob) processAudio(lastRecordedBlob); });
        resetRecordBtn.addEventListener('click', () => {
            lastRecordedBlob = null;
            playbackPreview.style.display = 'none';
            recordingSection.style.display = 'block';
        });

        document.getElementById('sent-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const f = document.getElementById('audio-input').files[0];
            if (f) processAudio(f);
        });
    </script>
</body>

</html>
