<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apriori Algorithm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .back-btn {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .back-btn:hover {
            color: #764ba2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.05);
        }

        .results {
            margin-top: 40px;
            display: none;
        }

        .results.show {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f5f5f5;
            color: #667eea;
            font-weight: 600;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            display: none;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Home</a>

        <div class="header">
            <h1>Apriori Algorithm</h1>
            <p>Mine association rules from your dataset</p>
        </div>

        <form id="aprioriForm">
            <div class="form-group">
                <label for="dataset">Upload CSV Dataset (binary/boolean format):</label>
                <input type="file" id="dataset" name="dataset" accept=".csv" required>
            </div>

            <div class="form-group">
                <label for="min_support">Minimum Support (0-1):</label>
                <input type="number" id="min_support" name="min_support" value="0.1" step="0.05" min="0" max="1"
                    required>
            </div>

            <div class="form-group">
                <label for="min_confidence">Minimum Confidence (0-1):</label>
                <input type="number" id="min_confidence" name="min_confidence" value="0.5" step="0.05" min="0" max="1"
                    required>
            </div>

            <button type="submit" class="btn-submit">Generate Rules</button>
        </form>

        <div class="loading" id="loading">
            Mining association rules... Please wait.
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <h2 style="color: #667eea; margin-bottom: 20px;">Association Rules</h2>
            <div id="rulesContainer"></div>
        </div>
    </div>

    <script>
        document.getElementById('aprioriForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('dataset', document.getElementById('dataset').files[0]);
            formData.append('min_support', document.getElementById('min_support').value);
            formData.append('min_confidence', document.getElementById('min_confidence').value);

            document.getElementById('loading').classList.add('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('results').classList.remove('show');

            try {
                const response = await fetch('/api/apriori-rules', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error processing request');
                }

                displayResults(data);
            } catch (error) {
                document.getElementById('error').textContent = ' ' + error.message;
                document.getElementById('error').classList.add('show');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        });

        function displayResults(data) {
            const container = document.getElementById('rulesContainer');

            let html = `
                <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <strong>Total Rules Found: ${data.total_rules}</strong>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Antecedent</th>
                            <th>Consequent</th>
                            <th>Support</th>
                            <th>Confidence</th>
                            <th>Lift</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.rules.forEach(rule => {
                html += `
                    <tr>
                        <td>${rule.antecedent}</td>
                        <td>${rule.consequent}</td>
                        <td>${(rule.support * 100).toFixed(2)}%</td>
                        <td>${(rule.confidence * 100).toFixed(2)}%</td>
                        <td>${rule.lift.toFixed(2)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';

            container.innerHTML = html;
            document.getElementById('results').classList.add('show');
        }
    </script>
</body>

</html>
